<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Event snippet for Purchase conversion page -->

      'send_to': 'AW-18269161569/q736CLzD-MQcEOGQtYdE',

      'currency': 'USD',

      // 'new_customer': true /* calculate dynamically, populate with true/false */,

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paid Message Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #75a842; --surface: #d0d0d0; --border: #000000;
    --gold: #b4a527f2; --silver: #9e9e9e; --bronze: #cd7f32;
    --text: #222222; --muted: #000000;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 48px 16px 80px;
  }
  .ticker {
    position: fixed; top: 0; left: 0; right: 0;
    background: var(--gold); color: #333333;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 2px; padding: 5px 0;
    text-align: center; z-index: 100;
  }

  /* Top right nav — sits inside the ticker bar */
  .topnav {
    position: fixed; top: 0; right: 12px; height: 27px;
    display: flex; align-items: center; gap: 12px;
    z-index: 101;
  }
  .topnav a {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: #333; text-decoration: none; transition: color 0.15s;
    line-height: 1;
  }
  .topnav a:hover { color: #000; }
  .topnav .divider { color: #555; font-size: 10px; line-height: 1; }
  .topnav .social {
    font-size: 13px; color: #333; text-decoration: none;
    transition: transform 0.15s, color 0.15s;
    display: flex; align-items: center;
  }
  .topnav .social:hover { color: #000; transform: scale(1.2); }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 8vw, 80px);
    letter-spacing: 4px; color: var(--gold);
    text-align: center; margin-bottom: 4px; line-height: 1;
  }
  .subtitle {
    color: var(--muted); font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 40px;
  }
  .form-card {
    background: var(--surface); border: 1px solid var(--border);
    border-top: 2px solid var(--gold); padding: 28px;
    width: 100%; max-width: 520px; margin-bottom: 24px;
  }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
  input {
    background: #919191; border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 13px; padding: 12px 14px; outline: none;
    transition: border-color 0.2s; flex: 1; min-width: 120px;
  }
  input:focus { border-color: var(--gold); }
  input::placeholder { color: var(--muted); }
  #amount { max-width: 110px; flex: 0 0 110px; }
  button {
    background: var(--gold); color: #000; border: none;
    font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    letter-spacing: 2px; padding: 12px 24px; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
  }
  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.97); }
  .feedback { font-size: 11px; margin-top: 10px; min-height: 16px; color: var(--gold); letter-spacing: 1px; }
  .feedback.error { color: #ee0055; }
  .search-card {
    width: 100%; max-width: 520px; margin-bottom: 16px;
    position: relative;
  }
  .search-row { display: flex; gap: 10px; }
  #search {
    background: #c4c4c4; border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 13px; padding: 12px 14px 12px 36px; outline: none;
    transition: border-color 0.2s; flex: 1; width: 100%;
  }
  #search:focus { border-color: var(--gold); }
  #search::placeholder { color: #555; }
  .search-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    font-size: 14px; color: #555; pointer-events: none;
  }
  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #555; font-size: 16px;
    cursor: pointer; padding: 4px 6px; font-family: 'DM Mono', monospace;
    display: none;
  }
  .search-clear.visible { display: block; }
  .search-meta {
    font-size: 10px; letter-spacing: 2px; color: rgba(0,0,0,0.6);
    text-transform: uppercase; margin-top: 6px; padding: 0 4px;
    min-height: 14px;
  }
  .board { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 6px; }
  .board-header {
    display: flex; justify-content: space-between;
    font-size: 10px; letter-spacing: 3px; color: var(--muted);
    text-transform: uppercase; padding: 0 14px 8px;
    border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .entry {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 14px 16px 14px 19px; animation: slideIn 0.3s ease;
    position: relative;
  }
  .entry::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .entry.rank-1::before { background: var(--gold); }
  .entry.rank-2::before { background: var(--silver); }
  .entry.rank-3::before { background: var(--bronze); }
  .entry.highlight { outline: 2px solid var(--gold); background: #c8c8c8; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
  .rank { font-family: 'Bebas Neue', sans-serif; font-size: 22px; width: 28px; flex-shrink: 0; color: var(--muted); }
  .entry.rank-1 .rank { color: var(--gold); }
  .entry.rank-2 .rank { color: var(--silver); }
  .entry.rank-3 .rank { color: var(--bronze); }
  .msg { flex: 1; font-size: 13px; word-break: break-word; }
  .msg mark { background: var(--gold); color: #000; padding: 0 1px; }
  .amount-badge { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); white-space: nowrap; }
  .empty { text-align: center; color: var(--muted); font-size: 12px; letter-spacing: 2px; padding: 40px 0; }
  .share-btn {
    background: none; border: 1px solid var(--border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 13px; line-height: 1;
    padding: 8px 9px; cursor: pointer; flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .share-btn:hover { background: var(--gold); }
  .share-btn:active { transform: scale(0.93); }
  .share-menu {
    position: absolute; right: 16px; top: 100%; margin-top: 4px;
    background: var(--surface); border: 1px solid var(--border);
    display: none; flex-direction: column; z-index: 50; min-width: 160px;
  }
  .share-menu.open { display: flex; }
  .share-menu button {
    background: none; border: none; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 12px;
    text-align: left; padding: 10px 12px; cursor: pointer;
  }
  .share-menu button:hover { background: var(--gold); }
  .share-toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--gold); color: #000; font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 1px; padding: 10px 18px;
    border: 1px solid var(--border); opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s; z-index: 200;
  }
  .share-toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="ticker">⚡ LIVE LEADERBOARD — MESSAGES RANKED BY TOTAL SPEND ⚡</div>

<!-- Top right nav inside ticker bar -->
<nav class="topnav">
  <a href="https://twitter.com/Moneyleaderbord" class="social" target="_blank" rel="noopener" title="X / Twitter">𝕏</a>
  <a href="https://discord.gg/yourinvite" class="social" target="_blank" rel="noopener" title="Discord">

  </a>
  <span class="divider">·</span>
  <a href="/terms.html">Terms</a>
  <a href="/privacy.html">Privacy</a>
</nav>

<h1>Leaderboard</h1>
<p class="subtitle">Pay to play · Messages stack · Min $1</p>

<div class="form-card">
  <div class="form-row">
    <input type="text" id="message" placeholder="Your message..." maxlength="120" autocomplete="off">
    <input type="number" id="amount" placeholder="$$$" min="1" step="1">
    <button onclick="goToCheckout()">Next →</button>
  </div>
  <div class="feedback" id="feedback"></div>
</div>

<div class="search-card">
  <div class="search-row">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search messages..." autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="search-meta" id="searchMeta"></div>
</div>

<div class="board" id="board">
  <div class="empty">Loading leaderboard...</div>
</div>

<div class="share-toast" id="shareToast"></div>

<script>
  let allEntries = [];
  let currentQuery = '';

  function goToCheckout() {
    const message = document.getElementById('message').value.trim();
    const amount  = parseInt(document.getElementById('amount').value);
    const feedback = document.getElementById('feedback');
    feedback.className = 'feedback';
    if (!message) {
      feedback.className = 'feedback error';
      feedback.textContent = '✕ Enter a message.';
      return;
    }
    if (!amount || amount < 1) {
      feedback.className = 'feedback error';
      feedback.textContent = '✕ Minimum amount is $1.';
      return;
    }
    const params = new URLSearchParams({ message, amount });
    window.location.href = `/checkout.html?${params}`;
  }

  async function loadLeaderboard(scrollToMessage) {
    try {
      const res = await fetch('https://back-boi-production.up.railway.app/leaderboard');
      const entries = await res.json();
      allEntries = entries;
      renderBoard(scrollToMessage);
    } catch {
      document.getElementById('board').innerHTML = '<div class="empty">Could not load leaderboard.</div>';
    }
  }

  function getFilteredEntries() {
    if (!currentQuery) return allEntries;
    const q = currentQuery.toLowerCase();
    return allEntries.filter(item => item.message.toLowerCase().includes(q));
  }

  function renderBoard(scrollToMessage) {
    const board = document.getElementById('board');
    const meta = document.getElementById('searchMeta');
    const filtered = getFilteredEntries();
    if (!allEntries.length) {
      board.innerHTML = '<div class="empty">No entries yet. Be first.</div>';
      meta.textContent = '';
      return;
    }
    if (currentQuery && !filtered.length) {
      board.innerHTML = `<div class="empty">No messages match "${escapeHtml(currentQuery)}".</div>`;
      meta.textContent = '';
      return;
    }
    meta.textContent = currentQuery
      ? `${filtered.length} match${filtered.length === 1 ? '' : 'es'} for "${currentQuery}"`
      : '';
    board.innerHTML = `<div class="board-header"><span>Rank · Message</span><span>Total</span></div>`;
    let targetEl = null;
    filtered.forEach((item) => {
      const trueRank = allEntries.indexOf(item) + 1;
      const div = document.createElement('div');
      div.className = `entry${trueRank <= 3 ? ` rank-${trueRank}` : ''}`;
      if (scrollToMessage && item.message.toLowerCase() === scrollToMessage.toLowerCase()) {
        div.classList.add('highlight');
        targetEl = div;
      }
      div.innerHTML = `
        <span class="rank">${trueRank}</span>
        <span class="msg">${highlightMatch(item.message)}</span>
        <span class="amount-badge">$${item.amount.toLocaleString()}</span>
        <button class="share-btn" title="Share">↗</button>
        <div class="share-menu">
          <button data-action="x">Share on X</button>
          <button data-action="copy">Copy link</button>
        </div>
      `;
      const shareBtn = div.querySelector('.share-btn');
      const shareMenu = div.querySelector('.share-menu');
      shareBtn.addEventListener('click', (e) => toggleShareMenu(e, shareMenu));
      div.querySelector('[data-action="x"]').addEventListener('click', () => shareToX(trueRank, item.message, item.amount, shareMenu));
      div.querySelector('[data-action="copy"]').addEventListener('click', () => copyShareLink(item.message, shareMenu));
      board.appendChild(div);
    });
    if (targetEl) {
      setTimeout(() => targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
    }
  }

  function highlightMatch(message) {
    const escaped = escapeHtml(message);
    if (!currentQuery) return escaped;
    const escapedQuery = escapeHtml(currentQuery);
    const safeQuery = escapedQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp(`(${safeQuery})`, 'ig'), '<mark>$1</mark>');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function clearSearch() {
    currentQuery = '';
    document.getElementById('search').value = '';
    document.getElementById('searchClear').classList.remove('visible');
    renderBoard();
  }

  let searchDebounce;
  document.getElementById('search').addEventListener('input', (e) => {
    clearTimeout(searchDebounce);
    const val = e.target.value;
    document.getElementById('searchClear').classList.toggle('visible', val.length > 0);
    searchDebounce = setTimeout(() => {
      currentQuery = val.trim();
      renderBoard();
    }, 150);
  });

  function showToast(text) {
    const toast = document.getElementById('shareToast');
    toast.textContent = text;
    toast.classList.add('visible');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('visible'), 2200);
  }

  function toggleShareMenu(e, menuEl) {
    e.stopPropagation();
    const wasOpen = menuEl.classList.contains('open');
    document.querySelectorAll('.share-menu.open').forEach(m => m.classList.remove('open'));
    if (!wasOpen) menuEl.classList.add('open');
  }

  document.addEventListener('click', () => {
    document.querySelectorAll('.share-menu.open').forEach(m => m.classList.remove('open'));
  });

  function getEntryUrl(message) {
    const url = new URL(window.location.origin + '/');
    url.searchParams.set('message', message);
    return url.toString();
  }

  function shareToX(rank, message, amount, menuEl) {
    const text = `I'm #${rank} on the Money Leaderboard with "${message}" — $${amount.toLocaleString()} spent. Think you can beat me?`;
    const url = getEntryUrl(message);
    const intent = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
    window.open(intent, '_blank', 'noopener,noreferrer,width=550,height=420');
    if (menuEl) menuEl.classList.remove('open');
  }

  async function copyShareLink(message, menuEl) {
    const url = getEntryUrl(message);
    try {
      await navigator.clipboard.writeText(url);
      showToast('✓ Link copied to clipboard');
    } catch {
      const tmp = document.createElement('textarea');
      tmp.value = url;
      document.body.appendChild(tmp);
      tmp.select();
      try { document.execCommand('copy'); showToast('✓ Link copied to clipboard'); }
      catch { showToast('Could not copy — copy manually: ' + url); }
      document.body.removeChild(tmp);
    }
    if (menuEl) menuEl.classList.remove('open');
  }

  document.getElementById('message').addEventListener('keydown', e => { if (e.key === 'Enter') goToCheckout(); });

  const params = new URLSearchParams(window.location.search);
  const justPaid = params.get('message');
  loadLeaderboard(justPaid);
  setInterval(() => loadLeaderboard(), 15000);
  if (justPaid) window.history.replaceState({}, '', '/');
</script>
</body>
</html>
